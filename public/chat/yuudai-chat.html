<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Class room</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root {
  --bg-dark:#1e1f22;--bg-mid:#2b2d31;--bg-light:#313338;--bg-input:#383a40;
  --bg-hover:#35373c;--accent:#5865f2;--accent-hover:#4752c4;--green:#23a55a;
  --red:#f23f42;--text:#f2f3f5;--text-muted:#949ba4;--text-dim:#80848e;--border:#3f4147;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg-dark);color:var(--text);height:100vh;overflow:hidden;display:flex;}

/* AUTH */
#authScreen{position:fixed;inset:0;background:#1e1f22;display:flex;align-items:center;justify-content:center;z-index:1000;}
.auth-box{background:var(--bg-mid);border-radius:8px;padding:32px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-logo img{width:72px;height:72px;border-radius:16px;}
.auth-logo h1{font-size:24px;font-weight:700;margin-top:12px;}
.auth-logo p{color:var(--text-muted);font-size:14px;margin-top:4px;}
.auth-tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:600;font-size:14px;color:var(--text-muted);border-bottom:2px solid transparent;transition:.2s;}
.auth-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.auth-form{display:flex;flex-direction:column;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;}
.form-group input{background:var(--bg-dark);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:4px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
.form-group input:focus{border-color:var(--accent);}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:12px;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit;margin-top:4px;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}
.auth-error{background:rgba(242,63,66,.15);border:1px solid var(--red);color:#ff7b7d;padding:10px 12px;border-radius:4px;font-size:13px;display:none;}
.auth-error.show{display:block;}

/* APP */
#app{display:none;width:100%;height:100vh;}
#app.visible{display:flex;}

/* Server sidebar */
.server-sidebar{width:72px;background:var(--bg-dark);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;flex-shrink:0;}
.server-icon{width:48px;height:48px;border-radius:50%;background:var(--bg-mid);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-radius .2s,background .2s;font-size:20px;font-weight:700;overflow:hidden;}
.server-icon:hover,.server-icon.active{border-radius:16px;background:var(--accent);}
.server-icon img{width:48px;height:48px;object-fit:cover;}
.server-divider{width:32px;height:2px;background:var(--border);border-radius:1px;}

/* Channel sidebar */
.channel-sidebar{width:220px;background:var(--bg-mid);display:flex;flex-direction:column;flex-shrink:0;}
.channel-header{padding:16px;border-bottom:1px solid var(--border);font-weight:700;font-size:15px;}
.channel-list{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ch-section-title{padding:16px 16px 4px;font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;}
.ch-section-title button{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px;line-height:1;transition:color .2s;}
.ch-section-title button:hover{color:var(--text);}
.ch-item{display:flex;align-items:center;gap:8px;padding:6px 12px;margin:1px 8px;border-radius:4px;cursor:pointer;color:var(--text-dim);font-size:14px;transition:background .15s,color .15s;}
.ch-item:hover{background:var(--bg-hover);color:var(--text-muted);}
.ch-item.active{background:var(--bg-hover);color:var(--text);}
.ch-item .ch-icon{font-size:16px;flex-shrink:0;}
.ch-item .ch-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-panel{padding:8px;background:#232428;display:flex;align-items:center;gap:8px;}
.user-av-sm{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;}
.user-av-sm img{width:100%;height:100%;object-fit:cover;}
.online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid #232428;}
.user-info{flex:1;min-width:0;}
.user-info .uname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-info .ustatus{font-size:11px;color:var(--text-dim);}
.upanel-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px;border-radius:4px;font-size:16px;transition:color .2s,background .2s;}
.upanel-btn:hover{color:var(--text);background:var(--bg-hover);}

/* Chat */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg-light);min-width:0;}
.chat-header{height:48px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;font-weight:600;}
.chat-header .ch-type{color:var(--text-dim);font-size:20px;}
.chat-header .ch-title{font-size:15px;}
.messages-wrap{flex:1;overflow-y:auto;padding:16px 0;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.msg-group{padding:2px 16px;display:flex;gap:16px;align-items:flex-start;position:relative;}
.msg-group:hover{background:rgba(0,0,0,.06);}
.msg-av{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;margin-top:2px;overflow:hidden;cursor:pointer;}
.msg-av img{width:100%;height:100%;object-fit:cover;}
.msg-body{flex:1;min-width:0;}
.msg-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
.msg-name{font-size:14px;font-weight:600;cursor:pointer;}
.msg-name:hover{text-decoration:underline;}
.msg-name.admin-badge::after{content:'👑';font-size:12px;margin-left:4px;}
.msg-time{font-size:11px;color:var(--text-dim);}
.msg-text{font-size:14px;line-height:1.5;color:var(--text);word-break:break-word;white-space:pre-wrap;}
.msg-text.system{color:var(--text-dim);font-style:italic;font-size:13px;}
.msg-image{max-width:400px;max-height:300px;border-radius:8px;margin-top:8px;cursor:pointer;}
.msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.react-btn{background:var(--bg-mid);border:1px solid var(--border);border-radius:999px;padding:3px 8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .15s;color:var(--text);}
.react-btn:hover{background:var(--bg-hover);}
.react-btn.mine{background:rgba(88,101,242,.2);border-color:var(--accent);}
.msg-actions{display:none;position:absolute;right:16px;top:0;background:var(--bg-mid);border:1px solid var(--border);border-radius:4px;padding:4px;gap:4px;}
.msg-group:hover .msg-actions{display:flex;}
.msg-act-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;padding:4px 6px;border-radius:3px;font-size:14px;transition:color .15s,background .15s;}
.msg-act-btn:hover{color:var(--text);background:var(--bg-hover);}
.msg-act-btn.danger:hover{color:var(--red);background:rgba(242,63,66,.1);}
.date-divider{display:flex;align-items:center;gap:12px;padding:16px 16px 8px;color:var(--text-dim);font-size:12px;}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* Input */
.input-area{padding:0 16px 16px;flex-shrink:0;}
.input-box{background:var(--bg-input);border-radius:8px;display:flex;align-items:flex-end;gap:8px;padding:8px 12px;}
.input-box textarea{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;max-height:200px;line-height:1.5;padding:4px 0;}
.input-box textarea::placeholder{color:var(--text-dim);}
.input-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:20px;padding:4px;border-radius:4px;transition:color .15s;flex-shrink:0;}
.input-btn:hover{color:var(--text);}
.input-btn.send{color:var(--accent);}
#imgPreview{padding:8px 16px 0;display:none;align-items:center;gap:8px;}
#imgPreview img{max-height:120px;border-radius:8px;}
#imgPreview button{background:var(--red);color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:12px;}

/* Command suggestions */
.cmd-list{position:absolute;bottom:100%;left:0;right:0;background:var(--bg-mid);border:1px solid var(--border);border-radius:8px;margin:0 16px 4px;overflow:hidden;z-index:50;}
.cmd-item{padding:10px 16px;cursor:pointer;display:flex;gap:12px;align-items:center;font-size:14px;transition:background .15s;}
.cmd-item:hover,.cmd-item.selected{background:var(--bg-hover);}
.cmd-item .cmd-name{color:var(--accent);font-weight:600;min-width:120px;}
.cmd-item .cmd-desc{color:var(--text-muted);}

/* Members sidebar */
.members-sidebar{width:240px;background:var(--bg-mid);padding:16px 8px;flex-shrink:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.mb-section-title{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;padding:8px;margin-bottom:4px;}
.mb-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background .15s;}
.mb-item:hover{background:var(--bg-hover);}
.mb-av{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;position:relative;overflow:hidden;}
.mb-av img{width:100%;height:100%;object-fit:cover;}
.mb-name{font-size:14px;color:var(--text-muted);}

/* Emoji picker */
.emoji-picker{position:fixed;background:var(--bg-mid);border:1px solid var(--border);border-radius:8px;padding:8px;z-index:100;display:grid;grid-template-columns:repeat(8,1fr);gap:4px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:4px;transition:background .15s;}
.emoji-btn:hover{background:var(--bg-hover);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-mid);border-radius:8px;padding:24px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;}
.modal-form{display:flex;flex-direction:column;gap:12px;}
.modal-form input,.modal-form select{background:var(--bg-dark);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:4px;font-size:14px;font-family:inherit;outline:none;}
.modal-form input:focus{border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-ghost{background:none;border:none;color:var(--text-muted);padding:10px 16px;border-radius:4px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:600;transition:background .15s;}
.btn-ghost:hover{background:var(--bg-hover);}

/* DM */
.dm-item{display:flex;align-items:center;gap:10px;padding:6px 12px;margin:1px 8px;border-radius:4px;cursor:pointer;color:var(--text-dim);font-size:14px;transition:background .15s,color .15s;}
.dm-item:hover{background:var(--bg-hover);color:var(--text-muted);}
.dm-item.active{background:var(--bg-hover);color:var(--text);}
.dm-av{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;overflow:hidden;}
.dm-av img{width:100%;height:100%;object-fit:cover;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-mid);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.toast.show{opacity:1;}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:9998;cursor:pointer;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;}

.loading-msg{text-align:center;padding:32px;color:var(--text-dim);font-size:14px;}

@media(max-width:768px){.members-sidebar{display:none;}}
@media(max-width:500px){.server-sidebar{width:56px;}.channel-sidebar{display:none;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="/img/classroom.192.png" onerror="this.style.display='none'">
      <h1>Class room</h1>
      <p>ようこそ！ログインして始めましょう</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">ログイン</div>
      <div class="auth-tab" onclick="switchTab('register')">アカウント作成</div>
    </div>
    <div class="auth-error" id="authError"></div>
    <div class="auth-form" id="loginForm">
      <div class="form-group"><label>ユーザーID</label><input type="text" id="loginId" placeholder="ユーザーID"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="loginPw" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()"></div>
      <button class="btn-primary" onclick="login()">ログイン</button>
    </div>
    <div class="auth-form" id="registerForm" style="display:none">
      <div class="form-group"><label>ユーザーID</label><input type="text" id="regId" placeholder="半角英数字・アンダーバーのみ" maxlength="20"></div>
      <div class="form-group"><label>パスワード</label><input type="password" id="regPw" placeholder="8文字以上" onkeydown="if(event.key==='Enter')register()"></div>
      <button class="btn-primary" onclick="register()">アカウント作成</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="server-sidebar">
    <div class="server-icon active" onclick="setView('channels')">
      <img src="/img/classroom.192.png" onerror="this.textContent='C'">
    </div>
    <div class="server-divider"></div>
    <div class="server-icon" onclick="setView('dm')">💬</div>
  </div>

  <div class="channel-sidebar">
    <div class="channel-header"><span id="sidebarTitle">Class room</span></div>
    <div class="channel-list" id="channelList"></div>
    <div class="user-panel">
      <div class="user-av-sm" id="myAvSm"><div class="online-dot"></div></div>
      <div class="user-info">
        <div class="uname" id="myUsernameSm">-</div>
        <div class="ustatus" id="myStatusSm">オンライン</div>
      </div>
      <button class="upanel-btn" onclick="logout()" title="ログアウト">🚪</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header">
      <span class="ch-type" id="chatIcon">#</span>
      <span class="ch-title" id="chatTitle">チャンネルを選択</span>
    </div>
    <div class="messages-wrap" id="messagesWrap">
      <div class="loading-msg">チャンネルを選択してください</div>
    </div>
    <div id="imgPreview"><img id="previewImg"><button onclick="clearImg()">✕ 削除</button></div>
    <div style="position:relative;">
      <div class="cmd-list" id="cmdList" style="display:none"></div>
      <div class="input-area">
        <div class="input-box">
          <button class="input-btn" onclick="triggerImg()" title="画像">📎</button>
          <textarea id="msgInput" placeholder="メッセージを入力… / でコマンド一覧" rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this);checkCmd(this.value)"></textarea>
          <button class="input-btn" onclick="toggleEmoji(event)">😊</button>
          <button class="input-btn send" onclick="sendMsg()">➤</button>
        </div>
      </div>
    </div>
    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="handleImgSelect(event)">
  </div>

  <div class="members-sidebar" id="membersSidebar"></div>
</div>

<!-- Emoji -->
<div class="emoji-picker" id="emojiPicker" style="display:none"></div>

<!-- Modals -->
<div class="modal-overlay" id="createChModal">
  <div class="modal">
    <h2>チャンネルを作成</h2>
    <div class="modal-form">
      <input type="text" id="newChName" placeholder="チャンネル名">
      <select id="newChType"><option value="public">全体チャンネル</option><option value="group">グループ</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('createChModal')">キャンセル</button>
      <button class="btn-primary" onclick="createChannel()">作成</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="newDmModal">
  <div class="modal">
    <h2>DMを開始</h2>
    <div class="modal-form"><input type="text" id="dmTarget" placeholder="ユーザーIDを入力"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('newDmModal')">キャンセル</button>
      <button class="btn-primary" onclick="startDm()">開始</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addMbModal">
  <div class="modal">
    <h2>メンバーを追加</h2>
    <div class="modal-form"><input type="text" id="addMbId" placeholder="ユーザーIDを入力"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('addMbModal')">キャンセル</button>
      <button class="btn-primary" onclick="addMember()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminPwModal">
  <div class="modal">
    <h2>🔐 管理者認証</h2>
    <div class="modal-form"><input type="password" id="adminPwInput" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')submitAdminPw()"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('adminPwModal')">キャンセル</button>
      <button class="btn-primary" onclick="submitAdminPw()">認証</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg"></div>
<div class="toast" id="toast"></div>

// ===== AUTH =====
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', tab==='login'?i===0:i===1));
  document.getElementById('loginForm').style.display = tab==='login'?'flex':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'flex':'none';
  hideErr();
}
function showErr(m){const e=document.getElementById('authError');e.textContent=m;e.classList.add('show');}
function hideErr(){document.getElementById('authError').classList.remove('show');}

async function login() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!id||!pw) return showErr('IDとパスワードを入力してください');
  const btn = document.querySelector('#loginForm .btn-primary');
  btn.disabled=true; btn.textContent='ログイン中...';
  const email = id+'@classroomapp.internal';
  const {error} = await sb.auth.signInWithPassword({email, password:pw});
  btn.disabled=false; btn.textContent='ログイン';
  if (error) return showErr('IDまたはパスワードが違います');
}

async function register() {
  const id = document.getElementById('regId').value.trim();
  const pw = document.getElementById('regPw').value;
  if (!id||!pw) return showErr('すべて入力してください');
  if (pw.length < 8) return showErr('パスワードは8文字以上にしてください');
  if (!/^[a-zA-Z0-9_]+$/.test(id)) return showErr('IDは半角英数字とアンダーバーのみ使えます');
  const btn = document.querySelector('#registerForm .btn-primary');
  btn.disabled=true; btn.textContent='作成中...';
  const {data:ex} = await sb.from('profiles').select('id').eq('username',id).maybeSingle();
  if (ex) { btn.disabled=false; btn.textContent='アカウント作成'; return showErr('このIDは既に使われています'); }
  const email = id+'@classroomapp.internal';
  const {data, error} = await sb.auth.signUp({email, password:pw});
  if (error) { btn.disabled=false; btn.textContent='アカウント作成'; return showErr('登録に失敗しました: '+error.message); }
  if (data.user) await sb.from('profiles').insert({id:data.user.id, username:id});
  btn.disabled=false; btn.textContent='アカウント作成';
  showToast('アカウントを作成しました！');
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    me = session.user;
    await loadProfile();
    showApp();
  }
});

async function loadProfile() {
  const {data} = await sb.from('profiles').select('*').eq('id', me.id).single();
  if (!data) return;
  myProfile = data;
  document.getElementById('myUsernameSm').textContent = data.username;
  const av = document.getElementById('myAvSm');
  av.innerHTML = `<span>${data.username[0].toUpperCase()}</span><div class="online-dot"></div>`;
  // 管理者チェック
  if (data.username === ADMIN_USER) {
    isAdmin = true;
    document.getElementById('myStatusSm').textContent = '👑 管理者';
  }
  // 最終オンライン更新
  await sb.from('profiles').update({last_seen: new Date().toISOString()}).eq('id', me.id);
}

async function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  await loadChannels();
  setupRealtime();
}

// ===== CHANNELS =====
async function loadChannels() {
  const {data:pub} = await sb.from('channels').select('*').eq('type','public').order('created_at');
  const {data:myMb} = await sb.from('channel_members').select('channel_id,channels(*)').eq('user_id', me.id);
  const groups = myMb?.filter(m=>m.channels?.type==='group').map(m=>m.channels)||[];
  dmChannels = myMb?.filter(m=>m.channels?.type==='dm').map(m=>m.channels)||[];

  // 管理者は全チャンネル見れる
  if (isAdmin) {
    const {data:allCh} = await sb.from('channels').select('*').order('created_at');
    channels = allCh||[];
    dmChannels = (allCh||[]).filter(c=>c.type==='dm');
    channels = (allCh||[]).filter(c=>c.type!=='dm');
  } else {
    channels = [...(pub||[]), ...groups];
  }
  if (currentView==='channels') renderChannelList();
  else renderDmList();
}

function renderChannelList() {
  const list = document.getElementById('channelList');
  document.getElementById('sidebarTitle').textContent = 'Class room';
  list.innerHTML='';
  const pubH = mkSectionTitle('テキストチャンネル', ()=>openModal('createChModal'));
  list.appendChild(pubH);
  channels.filter(c=>c.type==='public').forEach(c=>list.appendChild(mkChItem(c,'#')));
  const grpH = mkSectionTitle('グループ', ()=>openModal('createChModal'));
  list.appendChild(grpH);
  channels.filter(c=>c.type==='group').forEach(c=>list.appendChild(mkChItem(c,'👥')));
}

function renderDmList() {
  const list = document.getElementById('channelList');
  document.getElementById('sidebarTitle').textContent = 'ダイレクトメッセージ';
  list.innerHTML='';
  const h = mkSectionTitle('ダイレクトメッセージ', ()=>openModal('newDmModal'));
  list.appendChild(h);
  dmChannels.forEach(c=>{
    const item = document.createElement('div');
    item.className='dm-item'+(currentChId===c.id?' active':'');
    const name = c.name.replace('dm-','').split('-').filter(p=>p!==me.id&&p.length>5===false).join('') || c.name;
    item.innerHTML=`<div class="dm-av">${name[0]?.toUpperCase()||'?'}</div><span>${name}</span>`;
    item.onclick=()=>openChannel(c);
    list.appendChild(item);
  });
}

function mkSectionTitle(label, onClick) {
  const d = document.createElement('div');
  d.className='ch-section-title';
  d.innerHTML=`<span>${label}</span><button>+</button>`;
  d.querySelector('button').onclick=onClick;
  return d;
}

function mkChItem(c, icon) {
  const item = document.createElement('div');
  item.className='ch-item'+(currentChId===c.id?' active':'');
  item.innerHTML=`<span class="ch-icon">${icon}</span><span class="ch-name">${c.name}</span>`;
  item.onclick=()=>openChannel(c);
  return item;
}

async function openChannel(c) {
  currentChId = c.id;
  document.getElementById('chatIcon').textContent = c.type==='group'?'👥':c.type==='dm'?'@':'#';
  document.getElementById('chatTitle').textContent = c.name;
  document.querySelectorAll('.ch-item,.dm-item').forEach(el=>el.classList.remove('active'));
  await loadMessages();
  if (c.type!=='dm') loadMembers(c.id);
  else document.getElementById('membersSidebar').innerHTML='';
  renderChannelList();
  if (currentView==='dm') renderDmList();
}

// ===== DM =====
async function startDm() {
  const targetId = document.getElementById('dmTarget').value.trim();
  if (!targetId) return;
  const {data:target} = await sb.from('profiles').select('*').eq('username',targetId).maybeSingle();
  if (!target) return showToast('ユーザーが見つかりません');
  if (target.id===me.id) return showToast('自分にはDMできません');
  const {data:existing} = await sb.from('channel_members').select('channel_id,channels(*)').eq('user_id',me.id);
  const ex = existing?.find(m=>m.channels?.type==='dm'&&m.channels?.name.includes(target.username));
  if (ex) { closeModal('newDmModal'); return openChannel(ex.channels); }
  const {data:ch} = await sb.from('channels').insert({name:`dm-${myProfile.username}-${target.username}`,type:'dm',created_by:me.id}).select().single();
  await sb.from('channel_members').insert([{channel_id:ch.id,user_id:me.id},{channel_id:ch.id,user_id:target.id}]);
  closeModal('newDmModal');
  await loadChannels();
  openChannel(ch);
}

// ===== CREATE CHANNEL =====
async function createChannel() {
  const name = document.getElementById('newChName').value.trim();
  const type = document.getElementById('newChType').value;
  if (!name) return;
  const {data:ch} = await sb.from('channels').insert({name,type,created_by:me.id}).select().single();
  if (type==='group') await sb.from('channel_members').insert({channel_id:ch.id,user_id:me.id});
  closeModal('createChModal');
  await loadChannels();
  openChannel(ch);
}

// ===== MESSAGES =====
async function loadMessages() {
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML='<div class="loading-msg">読み込み中...</div>';
  const {data} = await sb.from('messages').select('*,profiles(username,avatar_url,last_seen)').eq('channel_id',currentChId).order('created_at',{ascending:true}).limit(100);
  renderMessages(data||[]);
  wrap.scrollTop = wrap.scrollHeight;
  markRead(data||[]);
}

function renderMessages(msgs) {
  const wrap = document.getElementById('messagesWrap');
  wrap.innerHTML='';
  if (!msgs.length){wrap.innerHTML='<div class="loading-msg">まだメッセージがありません。最初のメッセージを送りましょう！</div>';return;}
  let lastDate='';
  msgs.forEach(m=>{
    const d = new Date(m.created_at).toLocaleDateString('ja-JP');
    if (d!==lastDate){const div=document.createElement('div');div.className='date-divider';div.textContent=d;wrap.appendChild(div);lastDate=d;}
    wrap.appendChild(mkMsgEl(m));
  });
}

function mkMsgEl(m) {
  const g = document.createElement('div');
  g.className='msg-group'; g.dataset.id=m.id;
  const uname = m.profiles?.username||'不明';
  const time = new Date(m.created_at).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  const isMe = m.user_id===me?.id;
  const isAdminUser = uname===ADMIN_USER;
  const reactions = m.reactions||{};
  const readCount = (m.read_by||[]).length;
  const reactHtml = Object.entries(reactions).filter(([,v])=>v.length>0).map(([e,u])=>
    `<button class="react-btn${u.includes(me?.id)?' mine':''}" onclick="toggleReaction('${m.id}','${e}')">${e} ${u.length}</button>`
  ).join('');

  g.innerHTML=`
    <div class="msg-av">${uname[0]?.toUpperCase()||'?'}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-name${isAdminUser?' admin-badge':''}">${uname}</span>
        <span class="msg-time">${time}${readCount>1?' ✓✓':''}</span>
      </div>
      ${m.content?`<div class="msg-text${m.is_system?' system':''}">${escHtml(m.content)}</div>`:''}
      ${m.image_url?`<img class="msg-image" src="${m.image_url}" onclick="openLightbox('${m.image_url}')">` :''}
      <div class="msg-reactions">
        ${reactHtml}
        <button class="react-btn" style="opacity:.5" onclick="showEmojiForMsg(event,'${m.id}')">😊+</button>
      </div>
    </div>
    <div class="msg-actions">
      <button class="msg-act-btn" onclick="showEmojiForMsg(event,'${m.id}')">😊</button>
      ${isMe||isAdmin?`<button class="msg-act-btn danger" onclick="deleteMsg('${m.id}')">🗑️</button>`:''}
    </div>`;
  return g;
}

async function sendMsg() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content&&!selectedImg) return;
  if (!currentChId) return showToast('チャンネルを選択してください');

  // コマンド処理
  if (content.startsWith('/')) {
    input.value=''; autoResize(input);
    hideCmdList();
    return runCommand(content);
  }

  input.value=''; autoResize(input);
  let imageUrl=null;
  if (selectedImg) {
    const ext=selectedImg.name.split('.').pop();
    const path=`${me.id}/${Date.now()}.${ext}`;
    const {error} = await sb.storage.from('chat-images').upload(path,selectedImg);
    if (!error){const {data:u}=sb.storage.from('chat-images').getPublicUrl(path);imageUrl=u.publicUrl;}
    clearImg();
  }
  await sb.from('messages').insert({channel_id:currentChId,user_id:me.id,content:content||null,image_url:imageUrl,read_by:[me.id]});
}

function handleKey(e) {
  const cmdList = document.getElementById('cmdList');
  if (cmdList.style.display!=='none') {
    const items = cmdList.querySelectorAll('.cmd-item');
    if (e.key==='ArrowUp'){e.preventDefault();cmdSelectedIdx=Math.max(0,cmdSelectedIdx-1);highlightCmd(items);}
    else if (e.key==='ArrowDown'){e.preventDefault();cmdSelectedIdx=Math.min(items.length-1,cmdSelectedIdx+1);highlightCmd(items);}
    else if (e.key==='Enter'&&cmdSelectedIdx>=0){e.preventDefault();items[cmdSelectedIdx]?.click();return;}
    else if (e.key==='Escape'){hideCmdList();return;}
  }
  if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}

function highlightCmd(items){items.forEach((it,i)=>it.classList.toggle('selected',i===cmdSelectedIdx));}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,200)+'px';}

// ===== COMMAND =====
function checkCmd(val) {
  if (!val.startsWith('/')) { hideCmdList(); return; }
  const query = val.toLowerCase();
  const visible = COMMANDS.filter(c=>{
    if (c.adminOnly&&!isAdmin&&!isChannelOwner()) return false;
    return c.name.startsWith(query);
  });
  if (!visible.length) { hideCmdList(); return; }
  const list = document.getElementById('cmdList');
  list.style.display='block';
  cmdSelectedIdx=-1;
  list.innerHTML = visible.map(c=>`
    <div class="cmd-item" onclick="selectCmd('${c.name}')">
      <span class="cmd-name">${c.name}</span>
      <span class="cmd-desc">${c.desc}</span>
    </div>`).join('');
}

function selectCmd(name) {
  document.getElementById('msgInput').value=name+' ';
  document.getElementById('msgInput').focus();
  hideCmdList();
}
function hideCmdList(){document.getElementById('cmdList').style.display='none';}

async function isChannelOwner() {
  const ch = [...channels,...dmChannels].find(c=>c.id===currentChId);
  return ch?.created_by===me?.id;
}

async function runCommand(cmd) {
  const parts = cmd.trim().split(' ');
  const name = parts[0].toLowerCase();
  const args = parts.slice(1);
  const ch = [...channels,...dmChannels].find(c=>c.id===currentChId);
  const isOwner = ch?.created_by===me?.id;

  if (name==='/ping') {
    const start=Date.now();
    await sb.from('profiles').select('id').eq('id',me.id).single();
    const ms=Date.now()-start;
    return sysMsg(`🏓 Pong! 応答速度: ${ms}ms`);
  }

  if (name==='/lastseen') {
    const target=args[0];
    if (!target) return sysMsg('使い方: /lastseen ユーザーID');
    const {data} = await sb.from('profiles').select('username,last_seen').eq('username',target).maybeSingle();
    if (!data) return sysMsg('ユーザーが見つかりません');
    const t = data.last_seen ? new Date(data.last_seen).toLocaleString('ja-JP') : '不明';
    return sysMsg(`👁️ ${data.username} の最終オンライン: ${t}`);
  }

  if (name==='/members') {
    const {data} = await sb.from('channel_members').select('profiles(username)').eq('channel_id',currentChId);
    const names = data?.map(m=>m.profiles?.username).filter(Boolean)||[];
    return sysMsg('👥 メンバー: '+names.join(', '));
  }

  if (name==='/admin') {
    openModal('adminPwModal');
    return;
  }

  if (name==='/clear') {
    if (!isAdmin&&!isOwner) return sysMsg('⛔ このコマンドはチャンネルの作成者か管理者のみ使えます');
    if (!confirm('このチャンネルのメッセージを全削除しますか？')) return;
    await sb.from('messages').delete().eq('channel_id',currentChId);
    document.getElementById('messagesWrap').innerHTML='<div class="loading-msg">メッセージが全削除されました</div>';
    return;
  }

  if (name==='/ban') {
    if (!isAdmin) return sysMsg('⛔ 管理者のみ使えます');
    const target=args[0];
    if (!target) return sysMsg('使い方: /ban ユーザーID');
    const {data} = await sb.from('profiles').select('*').eq('username',target).maybeSingle();
    if (!data) return sysMsg('ユーザーが見つかりません');
    await sb.from('ip_bans').insert({ip_address:'user:'+data.id,banned_by:me.id,reason:'管理者によるBAN'});
    return sysMsg(`🔨 ${target} をBANしました`);
  }

  if (name==='/unban') {
    if (!isAdmin) return sysMsg('⛔ 管理者のみ使えます');
    const target=args[0];
    if (!target) return sysMsg('使い方: /unban ユーザーID');
    const {data} = await sb.from('profiles').select('*').eq('username',target).maybeSingle();
    if (!data) return sysMsg('ユーザーが見つかりません');
    await sb.from('ip_bans').delete().eq('ip_address','user:'+data.id);
    return sysMsg(`✅ ${target} のBANを解除しました`);
  }

  sysMsg('❓ 不明なコマンドです。 / で一覧を確認できます');
}

function sysMsg(text) {
  const wrap = document.getElementById('messagesWrap');
  const el = document.createElement('div');
  el.className='msg-group';
  el.innerHTML=`<div class="msg-av" style="background:var(--bg-mid)">⚙️</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-name">システム</span><span class="msg-time">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</span></div>
      <div class="msg-text system">${escHtml(text)}</div>
    </div>`;
  wrap.appendChild(el);
  wrap.scrollTop=wrap.scrollHeight;
}

// ===== REALTIME =====
function setupRealtime() {
  if (msgSub) sb.removeChannel(msgSub);
  msgSub = sb.channel('messages')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, async p=>{
      if (p.new.channel_id!==currentChId) return;
      const {data:prof} = await sb.from('profiles').select('username,avatar_url,last_seen').eq('id',p.new.user_id).single();
      const wrap=document.getElementById('messagesWrap');
      const empty=wrap.querySelector('.loading-msg');
      if(empty)empty.remove();
      wrap.appendChild(mkMsgEl({...p.new,profiles:prof}));
      wrap.scrollTop=wrap.scrollHeight;
      if (p.new.user_id!==me.id) {
        const rb=[...(p.new.read_by||[]),me.id];
        await sb.from('messages').update({read_by:rb}).eq('id',p.new.id);
      }
    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages'},p=>{
      if (p.new.channel_id!==currentChId) return;
      const el=document.querySelector(`[data-id="${p.new.id}"]`);
      if (!el) return;
      const reactions=p.new.reactions||{};
      const rd=el.querySelector('.msg-reactions');
      if (rd) {
        rd.innerHTML=Object.entries(reactions).filter(([,v])=>v.length>0).map(([e,u])=>
          `<button class="react-btn${u.includes(me?.id)?' mine':''}" onclick="toggleReaction('${p.new.id}','${e}')">${e} ${u.length}</button>`
        ).join('')+`<button class="react-btn" style="opacity:.5" onclick="showEmojiForMsg(event,'${p.new.id}')">😊+</button>`;
      }
    })
    .subscribe();
}

// ===== REACTIONS =====
async function toggleReaction(msgId, emoji) {
  const {data:m} = await sb.from('messages').select('reactions').eq('id',msgId).single();
  const r=m.reactions||{};
  const u=r[emoji]||[];
  r[emoji]=u.includes(me.id)?u.filter(x=>x!==me.id):[...u,me.id];
  await sb.from('messages').update({reactions:r}).eq('id',msgId);
}

function showEmojiForMsg(e,msgId){e.stopPropagation();emojiTarget=msgId;showEmojiPicker(e.clientX,e.clientY);}
function toggleEmoji(e){e.stopPropagation();emojiTarget=null;const p=document.getElementById('emojiPicker');if(p.style.display==='grid'){p.style.display='none';return;}showEmojiPicker(e.clientX,e.clientY-200);}
function showEmojiPicker(x,y){
  const p=document.getElementById('emojiPicker');
  p.innerHTML=EMOJIS.map(e=>`<button class="emoji-btn" onclick="selectEmoji('${e}')">${e}</button>`).join('');
  p.style.display='grid';
  p.style.left=Math.min(x,window.innerWidth-280)+'px';
  p.style.top=Math.max(y-160,8)+'px';
}
function selectEmoji(e){
  document.getElementById('emojiPicker').style.display='none';
  if(emojiTarget){toggleReaction(emojiTarget,e);emojiTarget=null;}
  else{const i=document.getElementById('msgInput');i.value+=e;i.focus();}
}
document.addEventListener('click',()=>{document.getElementById('emojiPicker').style.display='none';});

// ===== MEMBERS =====
async function loadMembers(chId) {
  const sb2=document.getElementById('membersSidebar');
  const {data}=await sb.from('channel_members').select('user_id,profiles(username,avatar_url)').eq('channel_id',chId);
  sb2.innerHTML=`<div class="mb-section-title">メンバー — ${data?.length||0}</div>`;
  data?.forEach(m=>{
    const el=document.createElement('div');el.className='mb-item';
    el.innerHTML=`<div class="mb-av">${m.profiles?.username?.[0]?.toUpperCase()||'?'}</div><span class="mb-name">${m.profiles?.username||'不明'}</span>`;
    sb2.appendChild(el);
  });
  const ch=[...channels].find(c=>c.id===chId);
  const isOwner=ch?.created_by===me?.id;
  if (ch?.type==='group'&&(isOwner||isAdmin)) {
    const btn=document.createElement('button');
    btn.className='btn-primary';btn.style.cssText='margin:12px 8px;width:calc(100% - 16px);font-size:13px;padding:8px;';
    btn.textContent='＋ メンバーを追加';btn.onclick=()=>openModal('addMbModal');
    sb2.appendChild(btn);
  }
}

async function addMember() {
  const uid=document.getElementById('addMbId').value.trim();
  if(!uid)return;
  const {data:t}=await sb.from('profiles').select('*').eq('username',uid).maybeSingle();
  if(!t)return showToast('ユーザーが見つかりません');
  await sb.from('channel_members').insert({channel_id:currentChId,user_id:t.id});
  closeModal('addMbModal');loadMembers(currentChId);showToast(`${uid} を追加しました！`);
}

async function deleteMsg(id) {
  if(!confirm('このメッセージを削除しますか？'))return;
  await sb.from('messages').delete().eq('id',id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
}

async function markRead(msgs) {
  const unread=msgs.filter(m=>!(m.read_by||[]).includes(me.id));
  for(const m of unread){
    await sb.from('messages').update({read_by:[...(m.read_by||[]),me.id]}).eq('id',m.id);
  }
}

// ===== IMAGE =====
function triggerImg(){document.getElementById('imgInput').click();}
function handleImgSelect(e){
  selectedImg=e.target.files[0];if(!selectedImg)return;
  const r=new FileReader();
  r.onload=ev=>{document.getElementById('previewImg').src=ev.target.result;document.getElementById('imgPreview').style.display='flex';};
  r.readAsDataURL(selectedImg);
}
function clearImg(){selectedImg=null;document.getElementById('imgPreview').style.display='none';document.getElementById('imgInput').value='';}
function openLightbox(url){document.getElementById('lightboxImg').src=url;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ===== VIEW =====
function setView(v){
  currentView=v;
  currentChId=null;
  document.getElementById('messagesWrap').innerHTML='<div class="loading-msg">チャンネルを選択してください</div>';
  document.getElementById('membersSidebar').innerHTML='';
  if(v==='channels')renderChannelList();else renderDmList();
}

// ===== UTILS =====
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
